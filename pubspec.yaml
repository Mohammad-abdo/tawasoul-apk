name: mobile_app
description: تواصل - تطبيق تأهيل الأطفال
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^13.0.0
  
  # UI Components
  flutter_screenutil: ^5.9.0
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.0.0
  pin_code_fields: ^8.0.1
  carousel_slider: ^5.0.0
  
  # Utilities
  image_picker: ^1.0.5
  intl: ^0.20.2
  
  # Icons
  flutter_svg: ^2.0.9
  
  # Audio
  audioplayers: ^5.2.1
  just_audio: ^0.9.36

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/logo.png
  
  # Fonts - Uncomment when font files are added to assets/fonts/
  # fonts:
  #   - family: ExpoArabic
  #     fonts:
  #       - asset: assets/fonts/ExpoArabic-Regular.ttf
  #       - asset: assets/fonts/ExpoArabic-Bold.ttf
  #         weight: 700
  #   - family: MadaniArabic
  #     fonts:
  #       - asset: assets/fonts/MadaniArabic-Regular.ttf
  #       - asset: assets/fonts/MadaniArabic-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/MadaniArabic-SemiBold.ttf
  #         weight: 600
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
